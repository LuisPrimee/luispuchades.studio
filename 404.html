		<style>

			:root {
				--bg:        #222222;
				--bg-panel:  #1a1a1a;
				--accent:    #bb8844;
				--border:    #eeeeee;
				--muted:     #8a928a;
				--font-body: "Merriweather", Georgia, serif;
				--font-head: "Source Sans Pro", Helvetica, sans-serif;
			}

			*, *::before, *::after { box-sizing: border-box; }

			body {
				background-color: var(--bg) !important;
			}
	/* ── IDENTIDAD arriba a la izquierda — vuelve al inicio ──── */
		.hero-topleft {
			position: fixed;
			top: 1.75rem;
			left: 2.5rem;
			z-index: 10000;
			display: flex;
			align-items: baseline;
			gap: 0.9rem;
			line-height: 1;
			text-decoration: none;
		}

		.hero-topleft .hero-name {
			font-family: var(--font-body);
			font-weight: 400;
			font-size: 1.4rem;
			letter-spacing: 0.02em;
			text-transform: uppercase;
			color: #ffffff;
			transition: color 0.2s ease-in-out;
		}

		.hero-topleft .hero-role {
			font-family: var(--font-body);
			font-weight: 400;
			font-size: 0.85rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: rgba(255,255,255,0.6);
			transition: color 0.2s ease-in-out;
		}

		.hero-topleft:hover .hero-name,
		.hero-topleft:hover .hero-role { color: var(--accent); }

		/* ── NAV — texto directo arriba a la derecha ───────────────── */
		#top-nav {
			position: fixed;
			top: 0;
			right: 0;
			z-index: 10000;
			display: flex;
			align-items: center;
			gap: 1.75rem;
			padding: 1.75rem 2.5rem;
		}

		#top-nav a {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.7rem;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: #ffffff;
			text-decoration: none;
			border-bottom: none;
			transition: color 0.2s ease-in-out;
		}

		#top-nav a .glyph { color: var(--accent); margin-right: 0.4rem; }
		#top-nav a:hover { color: var(--accent); }
		#top-nav a:hover .glyph { color: var(--accent); }

		@media screen and (max-width: 736px) {
			.hero-topleft { top: 1.25rem; left: 1.25rem; gap: 0.6rem; }
			.hero-topleft .hero-name { font-size: 1.05rem; }
			.hero-topleft .hero-role { font-size: 0.65rem; }
			#top-nav { padding: 1.25rem 1.25rem; gap: 1.1rem; }
			#top-nav a { font-size: 0.6rem; letter-spacing: 0.12em; }
		}

			/* ── ZONA CENTRAL 404 ───────────────────────────────────── */
			#error-hero {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				text-align: center;
				padding: 6rem 2rem;
				position: relative;
				overflow: hidden;
			}

			/* Vectorscopio decorativo, firma visual del sitio */
			.vectorscope {
				position: absolute;
				top: 2.5rem;
				right: 2.5rem;
				width: 160px;
				height: 160px;
				opacity: 0.5;
			}
			.vectorscope circle.ring { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 1; }
			.vectorscope line.axis { stroke: rgba(255,255,255,0.07); stroke-width: 1; }

			.error-code {
				font-family: var(--font-head);
				font-weight: 900;
				font-size: clamp(5rem, 18vw, 10rem);
				line-height: 1;
				letter-spacing: 0.02em;
				color: #ffffff;
				margin-bottom: 1rem;
				opacity: 0;
				animation: fadeUp 0.6s ease 0.1s forwards;
			}

			.error-code span { color: var(--accent); }

			.error-eyebrow {
				font-family: var(--font-head);
				font-weight: 900;
				font-size: 0.65rem;
				letter-spacing: 0.25em;
				text-transform: uppercase;
				color: var(--accent);
				margin-bottom: 1.5rem;
				opacity: 0;
				animation: fadeUp 0.6s ease 0s forwards;
			}

			.error-message {
				font-family: var(--font-body);
				font-weight: 300;
				font-size: 1rem;
				line-height: 1.9;
				color: var(--muted);
				max-width: 420px;
				margin: 0 auto 2.5rem;
				opacity: 0;
				animation: fadeUp 0.6s ease 0.25s forwards;
			}

			.btn-home {
				display: inline-flex;
				align-items: center;
				gap: 0.6rem;
				font-family: var(--font-head);
				font-weight: 900;
				font-size: 0.68rem;
				letter-spacing: 0.15em;
				text-transform: uppercase;
				color: #171717;
				background: var(--accent);
				border: solid 2px var(--accent);
				padding: 0.9rem 2.2rem;
				text-decoration: none;
				transition: filter 0.2s ease-in-out;
				opacity: 0;
				animation: fadeUp 0.6s ease 0.4s forwards;
			}

			.btn-home:hover { filter: brightness(1.15); border-bottom: solid 2px var(--accent) !important; }

			@keyframes fadeUp {
				from { opacity: 0; transform: translateY(18px); }
				to   { opacity: 1; transform: translateY(0); }
			}

			/* ── FOOTER (idéntico a work.html) ─────────────────────────── */
		#footer {
			background: var(--bg-panel) !important;
			border-top: none;
			width: 100%;
		}

		.footer-row {
			width: 100%;
			max-width: none;
			margin: 0;
			padding: 0.9rem 2.5rem !important;
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 16px;
			flex-wrap: wrap;
		}

		.footer-left p {
			margin: 0;
			font-family: var(--font-body);
			font-size: 1.4rem;
			font-weight: 400;
			color: #ffffff !important;
		}
		.footer-left p a { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.35) !important; }
		.footer-left p a:hover { color: var(--accent) !important; }

		.footer-right ul.icons.alt { display: flex; gap: 12px; list-style: none; margin: 0; padding: 0; }
		.footer-right ul.icons.alt li .icon:before { display: none; }
		.footer-right ul.icons.alt li a {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 2rem;
			height: 2rem;
			border: none;
			background: none;
			border-radius: 0;
			color: #ffffff;
			transition: color 0.2s ease-in-out, filter 0.2s ease-in-out;
		}
		.footer-right ul.icons.alt li a:hover {
			color: var(--accent);
			filter: drop-shadow(0 0 6px rgba(187,136,68,0.65));
		}
		.footer-right ul.icons.alt li a svg { width: 1.3rem; height: 1.3rem; fill: currentColor; }

		@media screen and (max-width: 736px) {
			.footer-row { flex-direction: column; align-items: flex-start; gap: 14px; padding: 1.25rem 1.5rem !important; }
			.bio-meta { flex-direction: column; gap: 1.25rem; }
		}

		<script>
			(function () {
				var toggle = document.getElementById('menu-toggle');
				var menu = document.getElementById('dropdown-menu');
				function closeMenu() { menu.classList.remove('open'); toggle.setAttribute('aria-expanded', 'false'); }
				function openMenu() { menu.classList.add('open'); toggle.setAttribute('aria-expanded', 'true'); }
				toggle.addEventListener('click', function (e) {
					e.stopPropagation();
					menu.classList.contains('open') ? closeMenu() : openMenu();
				});
				document.addEventListener('click', function (e) {
					if (!menu.contains(e.target) && e.target !== toggle) closeMenu();
				});
				document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeMenu(); });
				menu.querySelectorAll('a').forEach(function (link) { link.addEventListener('click', closeMenu); });
			})();
		</script>
