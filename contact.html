<!DOCTYPE HTML>
<html>
<head>
	<title>Contact | Luis Puchades </title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Source+Sans+Pro:wght@400;700;900&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="icon" type="image/x-icon" href="favicon-32x32.png" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	<style>

		/* ── VARIABLES ──────────────────────────────────────────────── */
		:root {
			--bg:        #222222;
			--bg-panel:  #1a1a1a;
			--accent:    #bb8844;
			--border:    #eeeeee;
			--muted:     #8a928a;
			--font-body: "Cormorant Garamond", Georgia, serif;
			--font-head: "Source Sans Pro", Helvetica, sans-serif;

			/*
				── CÓMO PONER TU PROPIA IMAGEN ──
				1) Copia tu foto a assets/images/contact-bg.jpg
				2) Cambia la línea de abajo por:
				   --hero-image: url("assets/images/contact-bg.jpg");
				El vectorscopio se queda encima como capa, funciona con o sin foto.
			*/
			--hero-image: url("images/pizarra.jpg");
		}

		/* ── BASE ───────────────────────────────────────────────────── */
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		html, body { height: 100%; }

		body {
			background-color: var(--bg);
			font-family: var(--font-body);
			font-weight: 300;
			font-size: 1rem;
			line-height: 2.1;
			color: var(--muted);
		}

		html { font-size: 17pt; }
		@media screen and (max-width: 1680px) { html { font-size: 13pt; } }
		@media screen and (max-width: 1280px) { html { font-size: 12pt; } }
		@media screen and (max-width:  360px) { html { font-size: 11pt; } }

		h1, h2, h3 {
			font-family: var(--font-head);
			font-weight: 900;
			letter-spacing: 0.075em;
			text-transform: uppercase;
			color: #ffffff;
		}

		a {
			color: var(--accent);
			text-decoration: none;
			border-bottom: dotted 1px rgba(187,136,68,0.4);
			transition: color 0.2s ease-in-out, border-color 0.2s ease-in-out;
		}
		a:hover { border-bottom-color: transparent; }

		/* ── IDENTIDAD arriba a la izquierda — vuelve al inicio ──── */
		.hero-topleft {
			position: fixed;
			top: 1.75rem;
			left: 2.5rem;
			z-index: 10000;
			display: flex;
			align-items: baseline;
			gap: 0.9rem;
			line-height: 1;
			text-decoration: none;
		}

		.hero-topleft .hero-name {
			font-family: var(--font-body);
			font-weight: 400;
			font-size: 1.4rem;
			letter-spacing: 0.02em;
			text-transform: uppercase;
			color: #ffffff;
			transition: color 0.2s ease-in-out;
		}

		.hero-topleft .hero-role {
			font-family: var(--font-body);
			font-weight: 400;
			font-size: 0.85rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: rgba(255,255,255,0.6);
			transition: color 0.2s ease-in-out;
		}

		.hero-topleft:hover .hero-name,
		.hero-topleft:hover .hero-role { color: var(--accent); }

		/* ── NAV — texto directo arriba a la derecha ───────────────── */
		#top-nav {
			position: fixed;
			top: 0;
			right: 0;
			z-index: 10000;
			display: flex;
			align-items: center;
			gap: 1.75rem;
			padding: 1.75rem 2.5rem;
		}

		#top-nav a {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.7rem;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: #ffffff;
			text-decoration: none;
			border-bottom: none;
			transition: color 0.2s ease-in-out;
		}

		#top-nav a .glyph { color: var(--accent); margin-right: 0.4rem; }
		#top-nav a:hover { color: var(--accent); }
		#top-nav a:hover .glyph { color: var(--accent); }

		@media screen and (max-width: 736px) {
			.hero-topleft { top: 1.25rem; left: 1.25rem; gap: 0.6rem; }
			.hero-topleft .hero-name { font-size: 1.05rem; }
			.hero-topleft .hero-role { font-size: 0.65rem; }
			#top-nav { padding: 1.25rem 1.25rem; gap: 1.1rem; }
			#top-nav a { font-size: 0.6rem; letter-spacing: 0.12em; }
		}

		/* ── LAYOUT SPLIT ───────────────────────────────────────────── */
		#split {
			display: grid;
			grid-template-columns: 1.1fr 1fr;
			min-height: 100vh;
		}

		/* Panel imagen + vectorscopio */
		#visual-panel {
			position: relative;
			background-image:
				linear-gradient(180deg, rgba(20,20,20,0.2) 0%, rgba(20,20,20,0.9) 100%),
				var(--hero-image);
			background-size: cover;
			background-position: center;
			display: flex;
			flex-direction: column;
			justify-content: flex-end;
			padding: 3.5rem;
			min-height: 480px;
			overflow: hidden;
		}

		#visual-panel::before {
			content: "";
			position: absolute;
			inset: 0;
			background: repeating-linear-gradient(
				0deg,
				rgba(255,255,255,0.015) 0px,
				rgba(255,255,255,0.015) 1px,
				transparent 1px,
				transparent 3px
			);
			pointer-events: none;
		}

		/* Vectorscopio: SVG de fondo, esquina superior derecha */
		.vectorscope {
			position: absolute;
			top: 2.5rem;
			right: 2.5rem;
			width: 220px;
			height: 220px;
			opacity: 0.9;
		}

		.vectorscope circle.ring {
			fill: none;
			stroke: rgba(255,255,255,0.12);
			stroke-width: 1;
		}

		.vectorscope line.axis {
			stroke: rgba(255,255,255,0.08);
			stroke-width: 1;
		}

		.vectorscope .target {
			fill-opacity: 0.85;
		}

		.vectorscope .target-label {
			font-family: 'Source Sans Pro', Helvetica, sans-serif;
			font-size: 8px;
			font-weight: 900;
			letter-spacing: 0.05em;
			fill: rgba(255,255,255,0.55);
		}

		.visual-eyebrow {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.65rem;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			color: var(--accent);
			margin-bottom: 1rem;
			position: relative;
			z-index: 1;
			opacity: 0;
			animation: fadeUp 0.6s ease 0.1s forwards;
		}

		#visual-panel h1 {
			font-size: 3.2rem;
			line-height: 1.05;
			margin-bottom: 1rem;
			position: relative;
			z-index: 1;
			opacity: 0;
			animation: fadeUp 0.6s ease 0.25s forwards;
		}

		#visual-panel .subtitle {
			max-width: 400px;
			font-size: 1rem;
			line-height: 1.9;
			color: rgba(255,255,255,0.65);
			position: relative;
			z-index: 1;
			opacity: 0;
			animation: fadeUp 0.6s ease 0.4s forwards;
		}

		/* Panel formulario */
		#form-panel {
			background: var(--bg-panel);
			display: flex;
			align-items: center;
			padding: 4rem 3.5rem;
		}

		#contact-section {
			width: 100%;
			max-width: 480px;
			margin: 0 auto;
			opacity: 0;
			animation: fadeUp 0.7s ease 0.55s forwards;
		}

		.form-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 1rem;
			margin-bottom: 1rem;
		}

		.form-group {
			display: flex;
			flex-direction: column;
			margin-bottom: 1.1rem;
		}

		.form-group label {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.65rem;
			letter-spacing: 0.075em;
			text-transform: uppercase;
			color: var(--muted);
			margin-bottom: 0.5rem;
			transition: color 0.2s ease-in-out;
		}

		.form-group:focus-within label { color: var(--accent); }

		.form-group input,
		.form-group textarea {
			background: transparent;
			border: none;
			border-bottom: solid 1px rgba(255,255,255,0.28);
			color: #ffffff;
			font-family: var(--font-body);
			font-size: 0.95rem;
			font-weight: 300;
			padding: 0.65rem 0.1rem;
			outline: none;
			transition: border-color 0.2s ease-in-out;
			-webkit-appearance: none;
			appearance: none;
		}

		.form-group input::placeholder,
		.form-group textarea::placeholder {
			color: rgba(138,146,154,0.55);
		}

		.form-group input:focus,
		.form-group textarea:focus {
			border-color: var(--accent);
		}

		.form-group textarea {
			resize: vertical;
			min-height: 130px;
			line-height: 1.7;
		}

		.btn-submit {
			display: inline-flex;
			align-items: center;
			gap: 0.6rem;
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.68rem;
			letter-spacing: 0.075em;
			text-transform: uppercase;
			color: #171717;
			background: var(--accent);
			border: solid 2px var(--accent);
			padding: 0.8rem 2.1rem;
			cursor: pointer;
			transition: background-color 0.2s ease-in-out,
			            border-color 0.2s ease-in-out,
			            filter 0.2s ease-in-out;
			margin-top: 1.25rem;
		}

		.btn-submit:hover,
		.btn-submit:focus-visible {
			filter: brightness(1.15);
		}

		.btn-submit:focus-visible {
			outline: 2px solid #ffffff;
			outline-offset: 3px;
		}

			/* ── FOOTER ─────────────────────────────────────────────── */
			#footer {
				background: var(--bg-panel) !important;
				border-top: none;
				width: 100%;
			}

			.footer-row {
				width: 100%;
				max-width: none;
				margin: 0;
				padding: 0.9rem 2.5rem !important;
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 16px;
				flex-wrap: wrap;
			}

			.footer-left p {
				margin: 0;
				font-family: var(--font-body);
				font-size: 1.4rem;
				font-weight: 400;
				color: #ffffff !important;
			}
			.footer-left p a { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.35) !important; }
			.footer-left p a:hover { color: var(--accent) !important; }

			.footer-right ul.icons.alt { display: flex; gap: 12px; list-style: none; margin: 0; padding: 0; }
			.footer-right ul.icons.alt li .icon:before { display: none; }
			.footer-right ul.icons.alt li a {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 2rem;
				height: 2rem;
				border: none;
				background: none;
				border-radius: 0;
				color: #ffffff;
				transition: color 0.2s ease-in-out, filter 0.2s ease-in-out;
			}
			.footer-right ul.icons.alt li a:hover {
				color: var(--accent);
				filter: drop-shadow(0 0 6px rgba(187,136,68,0.65));
			}
			.footer-right ul.icons.alt li a svg { width: 1.3rem; height: 1.3rem; fill: currentColor; }

			@media screen and (max-width: 736px) {
				.footer-row { flex-direction: column; align-items: flex-start; gap: 14px; padding: 1.25rem 1.5rem !important; }
			}

		/* ── ANIMACIONES ────────────────────────────────────────────── */
		@keyframes fadeUp {
			from { opacity: 0; transform: translateY(18px); }
			to   { opacity: 1; transform: translateY(0); }
		}

		@media (prefers-reduced-motion: reduce) {
			.visual-eyebrow, #visual-panel h1, #visual-panel .subtitle, #contact-section {
				animation: none;
				opacity: 1;
			}
		}

		/* ── RESPONSIVE ─────────────────────────────────────────────── */
		@media screen and (max-width: 900px) {
			#split { grid-template-columns: 1fr; }
			#visual-panel { min-height: 320px; padding: 2.25rem; }
			#visual-panel h1 { font-size: 2.4rem; }
			.vectorscope { width: 150px; height: 150px; top: 1.5rem; right: 1.5rem; }
			#form-panel { padding: 3rem 1.75rem; }
		}

		@media screen and (max-width: 480px) {
			.form-row { grid-template-columns: 1fr; }
			.footer-row { flex-direction: column; align-items: flex-start; gap: 14px; padding: 1.25rem 1.5rem !important; }
		}

	</style>
</head>
<body>

	<!-- IDENTIDAD — vuelve al inicio -->
	<a href="index.html" class="hero-topleft">
		<span class="hero-name">Luis Puchades</span>
		<span class="hero-role">Colorist</span>
	</a>

	<!-- NAV -->
	<nav id="top-nav" aria-label="Menú principal">
		<a href="work.html"><span class="glyph">►</span>Work</a>
		<a href="bio.html"><span class="glyph">·</span>Bio</a>
		<a href="contact.html"><span class="glyph">◇</span>Contact</a>
	</nav>

	<div id="split">

		<!-- PANEL IMAGEN + VECTORSCOPIO -->
		<div id="visual-panel">

			<!-- Vectorscopio: círculo con los 6 puntos de crominancia estándar (R/Mg/B/Cy/G/Yl) -->
			<svg class="vectorscope" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
				<circle class="ring" cx="110" cy="110" r="100" />
				<circle class="ring" cx="110" cy="110" r="66" />
				<circle class="ring" cx="110" cy="110" r="33" />
				<line class="axis" x1="10" y1="110" x2="210" y2="110" />
				<line class="axis" x1="110" y1="10" x2="110" y2="210" />

				<!-- R -->
				<circle class="target" cx="188" cy="70" r="5" fill="#ff4d4d" />
				<text class="target-label" x="196" y="73">R</text>
				<!-- Mg -->
				<circle class="target" cx="168" cy="188" r="5" fill="#ff4dd8" />
				<text class="target-label" x="176" y="192">MG</text>
				<!-- B -->
				<circle class="target" cx="52" cy="188" r="5" fill="#4d6bff" />
				<text class="target-label" x="30" y="200" text-anchor="end">B</text>
				<!-- Cy -->
				<circle class="target" cx="32" cy="70" r="5" fill="#4de0ff" />
				<text class="target-label" x="8" y="66" text-anchor="end">CY</text>
				<!-- G -->
				<circle class="target" cx="52" cy="32" r="5" fill="#4dff88" />
				<text class="target-label" x="30" y="24" text-anchor="end">G</text>
				<!-- Yl -->
				<circle class="target" cx="168" cy="32" r="5" fill="#f5e642" />
				<text class="target-label" x="176" y="24">YL</text>
			</svg>

			<span class="visual-eyebrow">Open for projects</span>
			<h1>Let's grade<br />something.</h1>
			<p class="subtitle">Spots, short films, and looks you can't quite describe yet — send over the details.</p>
		</div>

		<!-- PANEL FORMULARIO -->
		<div id="form-panel">
			<section id="contact-section">

				<form action="https://formsubmit.co/puchadesluis@gmail.com" method="POST">

					<input type="hidden" name="_next" value="https://luispuchades.studio/thanks.html">
					<input type="hidden" name="_captcha" value="false">

					<div class="form-row">
						<div class="form-group">
							<label for="name">Name</label>
							<input type="text" id="name" name="name" placeholder="Your name" required />
						</div>
						<div class="form-group">
							<label for="email">Email</label>
							<input type="email" id="email" name="email" placeholder="your@email.com" required />
						</div>
					</div>

					<div class="form-group">
						<label for="subject">Subject</label>
						<input type="text" id="subject" name="subject" placeholder="Project type, collaboration..." />
					</div>

					<div class="form-group">
						<label for="message">Message</label>
						<textarea id="message" name="message" placeholder="Tell me about your project..." required></textarea>
					</div>

					<button type="submit" class="btn-submit">Send message</button>

				</form>
			</section>
		</div>

	</div>

	<footer id="footer">
		<div class="footer-row">
			<div class="footer-left">
				<p><a href="mailto:puchadesluis@gmail.com">puchadesluis@gmail.com</a></p>
			</div>
			<div class="footer-right">
				<ul class="icons alt">
					<li>
						<a href="https://www.linkedin.com/in/luis-puchades-sanchez/" target="_blank" rel="noopener" class="icon brands alt fa-linkedin" aria-label="LinkedIn">
							<svg viewBox="0 0 24 24"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z"/></svg>
						</a>
					</li>
					<li>
						<a href="https://vimeo.com/user234213642" target="_blank" rel="noopener" class="icon brands alt fa-vimeo" aria-label="Vimeo">
							<svg viewBox="0 0 24 24"><path d="M22 7.35c-.1 2.1-1.56 4.98-4.4 8.62C14.28 20.8 11.53 23 9.27 23c-1.4 0-2.58-1.3-3.55-3.9L4 12.4C3.3 9.8 2.55 8.5 1.75 8.5c-.17 0-.77.36-1.8 1.08L0 8.4c1.13-1 2.24-2 3.34-3C4.82 4.1 5.93 3.4 6.66 3.33c1.66-.16 2.68.98 3.06 3.4.4 2.62.68 4.25.85 4.87.47 2.14.99 3.2 1.56 3.2.44 0 1.11-.7 2-2.08.88-1.39 1.36-2.45 1.42-3.18.13-1.2-.34-1.8-1.42-1.8-.5 0-1.03.12-1.57.35C13.6 4.55 15.65 2.7 18.72 2.8c2.24.07 3.3 1.52 3.28 4.55z"/></svg>
						</a>
					</li>
					<li>
						<a href="https://www.youtube.com/channel/UCR4lEZUgE2m-3378TOK-r_w" target="_blank" rel="noopener" class="icon brands alt fa-youtube" aria-label="YouTube">
							<svg viewBox="0 0 24 24"><path d="M23.5 6.19a3.02 3.02 0 0 0-2.12-2.14C19.51 3.5 12 3.5 12 3.5s-7.51 0-9.38.55A3.02 3.02 0 0 0 .5 6.19 31.6 31.6 0 0 0 0 12a31.6 31.6 0 0 0 .5 5.81 3.02 3.02 0 0 0 2.12 2.14c1.87.55 9.38.55 9.38.55s7.51 0 9.38-.55a3.02 3.02 0 0 0 2.12-2.14A31.6 31.6 0 0 0 24 12a31.6 31.6 0 0 0-.5-5.81zM9.6 15.6V8.4l6.27 3.6-6.27 3.6z"/></svg>
						</a>
					</li>
				</ul>
			</div>
		</div>
	</footer>

	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/jquery.scrollex.min.js"></script>
	<script src="assets/js/jquery.scrolly.min.js"></script>
	<script src="assets/js/browser.min.js"></script>
	<script src="assets/js/breakpoints.min.js"></script>
	<script src="assets/js/util.js"></script>
	<script src="assets/js/main.js"></script>

</body>
</html>
