	<style>

		/* ── VARIABLES ──────────────────────────────────────────────
		   Tipografía: Cormorant Garamond para todo el texto de lectura
		   (títulos grandes y párrafos, sustituye a Merriweather).
		   Source Sans Pro se mantiene solo para nav/etiquetas en
		   mayúsculas, igual que en el resto del sitio.
		*/
		:root {
			--bg:        #222222;
			--bg-panel:  #1a1a1a;
			--accent:    #bb8844;
			--border:    #eeeeee;
			--muted:     #8a928a;
			--font-body: "Cormorant Garamond", Georgia, serif;
			--font-head: "Source Sans Pro", Helvetica, sans-serif;
		}

		*, *::before, *::after { box-sizing: border-box; }

		body {
			font-family: var(--font-body);
		}

		p, .latest-work-header p {
			font-family: var(--font-body);
		}

		/* ── FONDO GENERAL ──────────────────────────────────────── */
		#main {
			background-color: var(--bg) !important;
		}

		/* ── NAV — texto directo arriba, sin desplegable ──────────── */
		#top-nav {
			position: fixed;
			top: 0;
			right: 0;
			z-index: 10000;
			display: flex;
			align-items: center;
			gap: 1.75rem;
			padding: 1.75rem 2.5rem;
		}

		#top-nav a {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.7rem;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: #ffffff;
			text-decoration: none;
			border-bottom: none;
			transition: color 0.2s ease-in-out;
		}

		#top-nav a .glyph {
			color: var(--accent);
			margin-right: 0.4rem;
		}

		#top-nav a:hover { color: var(--accent); }
		#top-nav a:hover .glyph { color: var(--accent); }

		@media screen and (max-width: 736px) {
			#top-nav { padding: 1.25rem 1.25rem; gap: 1.1rem; }
			#top-nav a { font-size: 0.6rem; letter-spacing: 0.12em; }
		}

		/* ── LATEST WORK — cuadrícula clicable debajo del hero ────── */
		#latest-work {
			max-width: 78rem;
			margin: 0 auto;
			padding: 5rem 3rem 6rem;
		}

		.latest-work-header {
			display: flex;
			align-items: baseline;
			justify-content: space-between;
			flex-wrap: wrap;
			gap: 1rem;
			margin-bottom: 2rem;
		}

		.section-eyebrow {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.7rem;
			letter-spacing: 0.25em;
			text-transform: uppercase;
			color: var(--accent);
		}

		.view-all-link {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.65rem;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			color: rgba(255,255,255,0.7);
			text-decoration: none;
			border-bottom: none;
			transition: color 0.2s ease-in-out;
		}

		.view-all-link:hover { color: var(--accent); }

		.work-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
			gap: 1.25rem;
		}

		.work-grid__item {
			position: relative;
			aspect-ratio: 4 / 3;
			overflow: hidden;
			background-size: cover;
			background-position: center;
			text-decoration: none;
			border: none;
			display: block;
			transition: transform 0.3s ease-in-out;
		}

		.work-grid__item:hover { transform: scale(1.02); }

		.work-grid__item::before {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(180deg, rgba(20,20,20,0) 40%, rgba(20,20,20,0.9) 100%);
			transition: opacity 0.3s ease-in-out;
		}

		.work-grid__title {
			position: absolute;
			left: 0; right: 0; bottom: 0;
			z-index: 1;
			padding: 1.5rem;
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.9rem;
			letter-spacing: 0.05em;
			text-transform: uppercase;
			color: #ffffff;
		}

		.work-grid__title span {
			display: block;
			font-family: var(--font-body);
			font-weight: 400;
			font-size: 0.95rem;
			font-style: italic;
			letter-spacing: 0.01em;
			text-transform: none;
			color: var(--accent);
			margin-top: 0.35rem;
		}

		@media screen and (max-width: 736px) {
			#latest-work { padding: 3.5rem 1.5rem 4rem; }
			.work-grid { grid-template-columns: 1fr; }
		}

		/* ── FOOTER (idéntico al resto del sitio, sin sección CLIENTS) ── */
		#footer {
			background: var(--bg-panel) !important;
			border-top: solid 2px var(--border);
		}

		.footer-row {
			max-width: 72rem;
			margin: 0 auto;
			padding: 1.5rem 2rem !important;
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 16px;
			flex-wrap: wrap;
		}

		.footer-left h3 {
			font-family: var(--font-head);
			font-size: 0.7rem;
			margin-bottom: 0.4rem;
			color: #ffffff;
		}

		.footer-left p {
			margin: 0;
			font-family: var(--font-body);
			font-size: 1.15rem;
			font-weight: 400;
			color: #ffffff !important;
		}

		.footer-right ul.icons.alt {
			display: flex;
			gap: 12px;
			list-style: none;
			margin: 0;
			padding: 0;
		}

		.footer-right ul.icons.alt li .icon:before {
			display: none;
		}

		.footer-right ul.icons.alt li a {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 2.4rem;
			height: 2.4rem;
			border: solid 2px rgba(255,255,255,0.7);
			border-radius: 50%;
			color: #ffffff;
			transition: color 0.2s ease-in-out, border-color 0.2s ease-in-out, background-color 0.2s ease-in-out;
		}

		.footer-right ul.icons.alt li a:hover {
			color: #171717;
			border-color: var(--accent);
			background-color: var(--accent);
		}

		.footer-right ul.icons.alt li a svg {
			width: 1.05rem;
			height: 1.05rem;
			fill: currentColor;
		}

		@media screen and (max-width: 736px) {
			.footer-row { flex-direction: column; align-items: flex-start; gap: 14px; }
		}

		/* ── HERO — estructura intacta, solo se estiliza con la
		     tipografía nueva; nada de vídeo/overlay/flecha se toca. */
		#intro h1.hero-title {
			font-family: var(--font-body);
			font-weight: 300;
			font-size: clamp(2.4rem, 7vw, 5.5rem);
			letter-spacing: 0.04em;
			text-transform: uppercase;
			color: #ffffff;
			margin: 0 0 1rem 0;
		}

		#intro h1.hero-title .hero-separator {
			color: var(--accent);
			margin: 0 0.5rem;
			font-weight: 300;
		}

		#intro p {
			font-family: var(--font-body);
			font-style: italic;
			font-size: 1.15rem;
			font-weight: 400;
			color: rgba(255,255,255,0.75);
		}

	</style>
