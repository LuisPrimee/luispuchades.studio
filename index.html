	<style>

		/* ── VARIABLES ────────────────────────────────────────────── */
		:root {
			--bg:        #222222;
			--bg-panel:  #1a1a1a;
			--accent:    #bb8844;
			--border:    #eeeeee;
			--muted:     #8a928a;
			--font-body: "Cormorant Garamond", Georgia, serif;
			--font-head: "Source Sans Pro", Helvetica, sans-serif;
		}

		*, *::before, *::after { box-sizing: border-box; }

		body {
			font-family: var(--font-body);
		}

		p, .latest-work-header p {
			font-family: var(--font-body);
		}

		/* ── FONDO GENERAL ──────────────────────────────────────── */
		#main {
			background-color: var(--bg) !important;
		}

		/* ── NAV — texto directo arriba a la derecha ──────────────── */
		#top-nav {
			position: fixed;
			top: 0;
			right: 0;
			z-index: 10000;
			display: flex;
			align-items: center;
			gap: 1.75rem;
			padding: 1.75rem 2.5rem;
		}

		#top-nav a {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.7rem;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: #ffffff;
			text-decoration: none;
			border-bottom: none;
			transition: color 0.2s ease-in-out;
		}

		#top-nav a .glyph {
			color: var(--accent);
			margin-right: 0.4rem;
		}

		#top-nav a:hover { color: var(--accent); }
		#top-nav a:hover .glyph { color: var(--accent); }

		@media screen and (max-width: 736px) {
			#top-nav { padding: 1.25rem 1.25rem; gap: 1.1rem; }
			#top-nav a { font-size: 0.6rem; letter-spacing: 0.12em; }
		}

		/* ── HERO — texto arriba a la izquierda, sin título grande ── */
		#intro {
			position: relative;
		}

		.hero-topleft {
			position: fixed;
			top: 1.75rem;
			left: 2.5rem;
			z-index: 10000;
			display: flex;
			align-items: baseline;
			gap: 0.9rem;
			line-height: 1;
			isolation: isolate;
			mix-blend-mode: difference;
		}

		.hero-topleft .hero-name {
			font-family: var(--font-body);
			font-weight: 400;
			font-size: 1.4rem;
			letter-spacing: 0.02em;
			text-transform: uppercase;
			color: #ffffff;
		}

		.hero-topleft .hero-role {
			font-family: var(--font-body);
			font-style: normal;
			font-weight: 400;
			font-size: 0.85rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: #ffffff;
		}

		@media screen and (max-width: 736px) {
			.hero-topleft { top: 1.25rem; left: 1.25rem; gap: 0.6rem; }
			.hero-topleft .hero-name { font-size: 1.05rem; }
			.hero-topleft .hero-role { font-size: 0.65rem; }
		}

		/* Flecha minimalista, centrada y más abajo en el hero */
		#intro .actions {
			position: absolute;
			bottom: 0.5rem;
			left: 50%;
			transform: translateX(-50%);
			z-index: 10;
			margin: 0;
		}

		#intro .actions li { list-style: none; }

		.hero-scroll-arrow {
			display: flex;
			align-items: center;
			justify-content: center;
			width: 2.4rem;
			height: 2.4rem;
			border: none;
			background: none;
			color: rgba(255,255,255,0.75);
			transition: color 0.2s ease-in-out, transform 0.2s ease-in-out;
			animation: hero-arrow-bounce 2s ease-in-out infinite;
		}

		.hero-scroll-arrow:hover {
			color: var(--accent);
		}

		.hero-scroll-arrow svg {
			width: 1.4rem;
			height: 1.4rem;
			stroke: currentColor;
			fill: none;
			stroke-width: 1.5;
			stroke-linecap: round;
			stroke-linejoin: round;
		}

		@keyframes hero-arrow-bounce {
			0%, 100% { transform: translateY(0); }
			50% { transform: translateY(6px); }
		}

		@media screen and (max-width: 736px) {
			#intro .actions { bottom: 0.4rem; }
		}

		/* ── LATEST WORK — cuadrícula clicable debajo del hero ────── */
		#latest-work {
			max-width: 78rem;
			margin: 0 auto;
			padding: 5rem 3rem 6rem;
		}

		.latest-work-header {
			display: flex;
			align-items: baseline;
			justify-content: space-between;
			flex-wrap: wrap;
			gap: 1rem;
			margin-bottom: 2rem;
		}

		.section-eyebrow {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.7rem;
			letter-spacing: 0.25em;
			text-transform: uppercase;
			color: var(--accent);
		}

		.view-all-link {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.65rem;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			color: rgba(255,255,255,0.7);
			text-decoration: none;
			border-bottom: none;
			transition: color 0.2s ease-in-out;
		}

		.view-all-link:hover { color: var(--accent); }

		/* 3 columnas fijas, banners grandes y casi pegados */
		.work-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 3px;
		}

		.work-grid__item {
			position: relative;
			aspect-ratio: 1 / 1;
			overflow: hidden;
			background-size: cover;
			background-position: center;
			text-decoration: none;
			border: none;
			display: block;
		}

		.work-grid__item::before {
			content: "";
			position: absolute;
			inset: 0;
			background: rgba(10,10,10,0.55);
			opacity: 0;
			transition: opacity 0.3s ease-in-out;
		}

		.work-grid__item:hover::before { opacity: 1; }

		/* Título y subtítulo centrados, solo visibles al hover */
		.work-grid__title {
			position: absolute;
			inset: 0;
			z-index: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			text-align: center;
			padding: 1rem;
			font-family: var(--font-body);
			font-weight: 400;
			font-size: 1.35rem;
			letter-spacing: 0.03em;
			text-transform: none;
			color: #ffffff;
			opacity: 0;
			transform: scale(0.96);
			transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
		}

		.work-grid__item:hover .work-grid__title {
			opacity: 1;
			transform: scale(1);
		}

		.work-grid__title span {
			display: block;
			font-family: var(--font-head);
			font-weight: 700;
			font-size: 0.7rem;
			font-style: normal;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			color: var(--accent);
			margin-top: 0.55rem;
		}

		@media screen and (max-width: 736px) {
			#latest-work { padding: 3.5rem 1.5rem 4rem; }
			.work-grid { grid-template-columns: repeat(2, 1fr); }
		}

		@media screen and (max-width: 480px) {
			.work-grid { grid-template-columns: 1fr; }
		}

		/* ── CLIENTS — franja de logos abajo del todo, antes del footer ── */
		#clients {
			max-width: 78rem;
			margin: 0 auto;
			padding: 0 3rem 5rem;
			text-align: center;
		}

		#clients .section-eyebrow {
			display: block;
			margin-bottom: 2rem;
		}

		.clients-grid {
			display: grid;
			grid-template-columns: repeat(6, 1fr);
			align-items: center;
			gap: 2rem;
		}

		.clients-grid img {
			max-width: 100%;
			max-height: 3.2rem;
			width: auto;
			margin: 0 auto;
			display: block;
			filter: grayscale(100%) brightness(1.6) opacity(0.6);
			transition: filter 0.25s ease-in-out;
		}

		.clients-grid img:hover {
			filter: grayscale(0%) brightness(1) opacity(1);
		}

		@media screen and (max-width: 736px) {
			#clients { padding: 0 1.5rem 4rem; }
			.clients-grid { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
		}

		/* ── FOOTER ─────────────────────────────────────────────── */
			#footer {
				background: var(--bg-panel) !important;
				border-top: none;
				width: 100%;
			}

			.footer-row {
				width: 100%;
				max-width: none;
				margin: 0;
				padding: 0.9rem 2.5rem !important;
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 16px;
				flex-wrap: wrap;
			}

			.footer-left p {
				margin: 0;
				font-family: var(--font-body);
				font-size: 1.4rem;
				font-weight: 400;
				color: #ffffff !important;
			}
			.footer-left p a { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.35) !important; }
			.footer-left p a:hover { color: var(--accent) !important; }

			.footer-right ul.icons.alt { display: flex; gap: 12px; list-style: none; margin: 0; padding: 0; }
			.footer-right ul.icons.alt li .icon:before { display: none; }
			.footer-right ul.icons.alt li a {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 2rem;
				height: 2rem;
				border: none;
				background: none;
				border-radius: 0;
				color: #ffffff;
				transition: color 0.2s ease-in-out, filter 0.2s ease-in-out;
			}
			.footer-right ul.icons.alt li a:hover {
				color: var(--accent);
				filter: drop-shadow(0 0 6px rgba(187,136,68,0.65));
			}
			.footer-right ul.icons.alt li a svg { width: 1.3rem; height: 1.3rem; fill: currentColor; }

			@media screen and (max-width: 736px) {
				.footer-row { flex-direction: column; align-items: flex-start; gap: 14px; padding: 1.25rem 1.5rem !important; }
			}

	</style>
</head>
