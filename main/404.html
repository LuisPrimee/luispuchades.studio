<!DOCTYPE HTML>
<html>
	<head>
		<title>404 — Luis Puchades - Colorist</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="icon" type="image/x-icon" href="favicon-32x32.png" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

		<style>

			:root {
				--bg:        #222222;
				--bg-panel:  #1a1a1a;
				--accent:    #bb8844;
				--border:    #eeeeee;
				--muted:     #8a928a;
				--font-body: "Merriweather", Georgia, serif;
				--font-head: "Source Sans Pro", Helvetica, sans-serif;
			}

			*, *::before, *::after { box-sizing: border-box; }

			body {
				background-color: var(--bg) !important;
			}

			/* ── MENÚ FLOTANTE (idéntico al de index.html) ─────────── */
			#menu-toggle {
				position: fixed;
				top: 1.5rem;
				right: 1.5rem;
				z-index: 10000;
				width: 3rem;
				height: 3rem;
				border-radius: 50%;
				border: solid 2px rgba(255,255,255,0.55);
				background: rgba(20,20,20,0.55);
				backdrop-filter: blur(8px);
				-webkit-backdrop-filter: blur(8px);
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				padding: 0;
				transition: border-color 0.2s ease-in-out;
			}

			#menu-toggle:hover,
			#menu-toggle[aria-expanded="true"] {
				border-color: var(--accent);
			}

			#menu-toggle img {
				width: 1.6rem;
				height: 1.6rem;
				border-radius: 50%;
				display: block;
			}

			#dropdown-menu {
				position: fixed;
				top: 4.75rem;
				right: 1.5rem;
				z-index: 9999;
				min-width: 11rem;
				background: rgba(20,20,20,0.9);
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				border: solid 2px rgba(255,255,255,0.15);
				padding: 0.5rem;
				opacity: 0;
				transform: translateY(-8px);
				pointer-events: none;
				transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
			}

			#dropdown-menu.open {
				opacity: 1;
				transform: translateY(0);
				pointer-events: auto;
			}

			#dropdown-menu a {
				display: block;
				font-family: var(--font-head);
				font-weight: 900;
				font-size: 0.7rem;
				letter-spacing: 0.15em;
				text-transform: uppercase;
				color: #ffffff;
				text-decoration: none;
				border-bottom: none;
				padding: 0.85rem 1rem;
				transition: color 0.2s ease-in-out, background-color 0.2s ease-in-out;
			}

			#dropdown-menu a:hover {
				color: var(--accent);
				background: rgba(255,255,255,0.04);
			}

			/* ── ZONA CENTRAL 404 ───────────────────────────────────── */
			#error-hero {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				text-align: center;
				padding: 6rem 2rem;
				position: relative;
				overflow: hidden;
			}

			/* Vectorscopio decorativo, firma visual del sitio */
			.vectorscope {
				position: absolute;
				top: 2.5rem;
				right: 2.5rem;
				width: 160px;
				height: 160px;
				opacity: 0.5;
			}
			.vectorscope circle.ring { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 1; }
			.vectorscope line.axis { stroke: rgba(255,255,255,0.07); stroke-width: 1; }

			.error-code {
				font-family: var(--font-head);
				font-weight: 900;
				font-size: clamp(5rem, 18vw, 10rem);
				line-height: 1;
				letter-spacing: 0.02em;
				color: #ffffff;
				margin-bottom: 1rem;
				opacity: 0;
				animation: fadeUp 0.6s ease 0.1s forwards;
			}

			.error-code span { color: var(--accent); }

			.error-eyebrow {
				font-family: var(--font-head);
				font-weight: 900;
				font-size: 0.65rem;
				letter-spacing: 0.25em;
				text-transform: uppercase;
				color: var(--accent);
				margin-bottom: 1.5rem;
				opacity: 0;
				animation: fadeUp 0.6s ease 0s forwards;
			}

			.error-message {
				font-family: var(--font-body);
				font-weight: 300;
				font-size: 1rem;
				line-height: 1.9;
				color: var(--muted);
				max-width: 420px;
				margin: 0 auto 2.5rem;
				opacity: 0;
				animation: fadeUp 0.6s ease 0.25s forwards;
			}

			.btn-home {
				display: inline-flex;
				align-items: center;
				gap: 0.6rem;
				font-family: var(--font-head);
				font-weight: 900;
				font-size: 0.68rem;
				letter-spacing: 0.15em;
				text-transform: uppercase;
				color: #171717;
				background: var(--accent);
				border: solid 2px var(--accent);
				padding: 0.9rem 2.2rem;
				text-decoration: none;
				transition: filter 0.2s ease-in-out;
				opacity: 0;
				animation: fadeUp 0.6s ease 0.4s forwards;
			}

			.btn-home:hover { filter: brightness(1.15); border-bottom: solid 2px var(--accent) !important; }

			@keyframes fadeUp {
				from { opacity: 0; transform: translateY(18px); }
				to   { opacity: 1; transform: translateY(0); }
			}

			/* ── FOOTER (idéntico a contact.html) ──────────────────── */
			#footer {
				background: var(--bg-panel) !important;
				border-top: solid 2px var(--border);
			}

			.footer-row {
				max-width: 72rem;
				margin: 0 auto;
				padding: 1.5rem 2rem !important;
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 16px;
				flex-wrap: wrap;
			}

			.footer-left h3 { font-size: 0.7rem; margin-bottom: 0.4rem; color: #ffffff; }
			.footer-left p { margin: 0; font-size: 1.05rem; font-weight: 300; color: #ffffff !important; }

			.footer-right ul.icons.alt {
				display: flex; gap: 12px; list-style: none; margin: 0; padding: 0;
			}
			.footer-right ul.icons.alt li .icon:before { display: none; }
			.footer-right ul.icons.alt li a {
				display: inline-flex; align-items: center; justify-content: center;
				width: 2.4rem; height: 2.4rem;
				border: solid 2px rgba(255,255,255,0.7);
				border-radius: 50%;
				color: #ffffff;
				transition: color 0.2s ease-in-out, border-color 0.2s ease-in-out, background-color 0.2s ease-in-out;
			}
			.footer-right ul.icons.alt li a:hover {
				color: #171717; border-color: var(--accent); background-color: var(--accent);
			}
			.footer-right ul.icons.alt li a svg { width: 1.05rem; height: 1.05rem; fill: currentColor; }

			@media screen and (max-width: 736px) {
				.footer-row { flex-direction: column; align-items: flex-start; gap: 14px; }
				#menu-toggle { top: 1rem; right: 1rem; }
				#dropdown-menu { top: 4.25rem; right: 1rem; }
				.vectorscope { width: 110px; height: 110px; top: 1.25rem; right: 1.25rem; }
			}

		</style>
	</head>

		<script>
			(function () {
				var toggle = document.getElementById('menu-toggle');
				var menu = document.getElementById('dropdown-menu');
				function closeMenu() { menu.classList.remove('open'); toggle.setAttribute('aria-expanded', 'false'); }
				function openMenu() { menu.classList.add('open'); toggle.setAttribute('aria-expanded', 'true'); }
				toggle.addEventListener('click', function (e) {
					e.stopPropagation();
					menu.classList.contains('open') ? closeMenu() : openMenu();
				});
				document.addEventListener('click', function (e) {
					if (!menu.contains(e.target) && e.target !== toggle) closeMenu();
				});
				document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeMenu(); });
				menu.querySelectorAll('a').forEach(function (link) { link.addEventListener('click', closeMenu); });
			})();
		</script>
