	<link rel="icon" type="image/x-icon" href="favicon-32x32.png" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

	<style>

		/* ── VARIABLES (idénticas al index) ───────────────────────── */
		:root {
			--bg:        #222222;
			--bg-panel:  #1a1a1a;
			--accent:    #bb8844;
			--border:    #eeeeee;
			--muted:     #8a928a;
			--font-body: "Cormorant Garamond", Georgia, serif;
			--font-head: "Source Sans Pro", Helvetica, sans-serif;
		}

		*, *::before, *::after { box-sizing: border-box; }

		html, body { height: 100%; }
		body {
			background-color: var(--bg) !important;
			font-family: var(--font-body);
		}

		#main { background-color: var(--bg) !important; }

		/* ── NAV — idéntico al index, arriba a la derecha ─────────── */
		#top-nav {
			position: fixed;
			top: 0;
			right: 0;
			z-index: 10000;
			display: flex;
			align-items: center;
			gap: 1.75rem;
			padding: 1.75rem 2.5rem;
		}

		#top-nav a {
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.7rem;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: #ffffff;
			text-decoration: none;
			border-bottom: none;
			transition: color 0.2s ease-in-out;
		}

		#top-nav a .glyph { color: var(--accent); margin-right: 0.4rem; }
		#top-nav a:hover { color: var(--accent); }
		#top-nav a:hover .glyph { color: var(--accent); }

		@media screen and (max-width: 736px) {
			#top-nav { padding: 1.25rem 1.25rem; gap: 1.1rem; }
			#top-nav a { font-size: 0.6rem; letter-spacing: 0.12em; }
		}

		/* ── HEADER ─────────────────────────────────────────────── */
		#work-header {
			padding: 8rem 3rem 1rem;
			max-width: 78rem;
			margin: 0 auto;
			text-align: center;
		}

		#work-header .eyebrow {
			display: block;
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.65rem;
			letter-spacing: 0.25em;
			text-transform: uppercase;
			color: var(--accent);
			margin-bottom: 0.75rem;
		}

		#work-header h1 {
			font-family: var(--font-body);
			font-weight: 400;
			font-size: clamp(2.4rem, 6vw, 4rem);
			line-height: 1.1;
			letter-spacing: 0.02em;
			text-transform: uppercase;
			color: #ffffff;
			margin: 0;
		}

		@media screen and (max-width: 736px) {
			#work-header { padding: 6.5rem 1.5rem 0.5rem; }
		}

		/* ── FILTROS — pestañas centradas, texto en blanco legible ── */
		#work-filters {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 2.25rem;
			flex-wrap: wrap;
			padding: 2.5rem 1.5rem 1rem;
			max-width: 78rem;
			margin: 0 auto;
		}

		.filter-tab {
			background: none;
			border: none;
			padding: 0 0 0.6rem;
			cursor: pointer;
			font-family: var(--font-head);
			font-weight: 900;
			font-size: 0.7rem;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: #ffffff;
			border-bottom: solid 2px transparent;
			transition: color 0.2s ease-in-out, border-color 0.2s ease-in-out;
		}

		.filter-tab:hover { color: var(--accent); }

		.filter-tab.active {
			color: var(--accent);
			border-bottom-color: var(--accent);
		}

		@media screen and (max-width: 736px) {
			#work-filters { gap: 1.25rem; padding: 1.75rem 1.25rem 0.75rem; }
			.filter-tab { font-size: 0.6rem; letter-spacing: 0.12em; }
		}

		/* ── GRID DE TRABAJOS — como el index, más grande y completo ── */
		#work-grid-section {
			max-width: 82rem;
			margin: 0 auto;
			padding: 1.5rem 3rem 6rem;
		}

		.work-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 4px;
		}

		.work-grid__item {
			position: relative;
			aspect-ratio: 3 / 2;
			overflow: hidden;
			background-size: cover;
			background-position: center;
			text-decoration: none;
			border: none;
			display: block;
			transition: opacity 0.25s ease-in-out;
		}

		.work-grid__item.is-hidden {
			display: none;
		}

		.work-grid__item::before {
			content: "";
			position: absolute;
			inset: 0;
			background: rgba(10,10,10,0.55);
			opacity: 0;
			transition: opacity 0.3s ease-in-out;
		}

		.work-grid__item:hover::before { opacity: 1; }

		.work-grid__title {
			position: absolute;
			inset: 0;
			z-index: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			text-align: center;
			padding: 1rem;
			font-family: var(--font-body);
			font-weight: 400;
			font-size: 1.5rem;
			letter-spacing: 0.03em;
			text-transform: none;
			color: #ffffff;
			opacity: 0;
			transform: scale(0.96);
			transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
		}

		.work-grid__item:hover .work-grid__title {
			opacity: 1;
			transform: scale(1);
		}

		.work-grid__title span {
			display: block;
			font-family: var(--font-head);
			font-weight: 700;
			font-size: 0.7rem;
			font-style: normal;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			color: var(--accent);
			margin-top: 0.6rem;
		}

		@media screen and (max-width: 900px) {
			.work-grid { grid-template-columns: repeat(2, 1fr); }
		}

		@media screen and (max-width: 736px) {
			#work-grid-section { padding: 1rem 1.5rem 4rem; }
		}

		@media screen and (max-width: 480px) {
			.work-grid { grid-template-columns: 1fr; }
		}

		/* ── FOOTER (idéntico al resto del sitio) ─────────────────── */
		#footer {
			background: var(--bg-panel) !important;
			border-top: solid 2px var(--border);
		}

		.footer-row {
			max-width: 72rem;
			margin: 0 auto;
			padding: 1.5rem 2rem !important;
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 16px;
			flex-wrap: wrap;
		}

		.footer-left h3 {
			font-family: var(--font-head);
			font-size: 0.7rem;
			margin-bottom: 0.4rem;
			color: #ffffff;
		}

		.footer-left p {
			margin: 0;
			font-family: var(--font-body);
			font-size: 1.15rem;
			font-weight: 400;
			color: #ffffff !important;
		}

		.footer-left p a { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.35) !important; }
		.footer-left p a:hover { color: var(--accent) !important; }

		.footer-right ul.icons.alt {
			display: flex;
			gap: 12px;
			list-style: none;
			margin: 0;
			padding: 0;
		}

		.footer-right ul.icons.alt li .icon:before { display: none; }

		.footer-right ul.icons.alt li a {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 2.4rem;
			height: 2.4rem;
			border: solid 2px rgba(255,255,255,0.7);
			border-radius: 50%;
			color: #ffffff;
			transition: color 0.2s ease-in-out, border-color 0.2s ease-in-out, background-color 0.2s ease-in-out;
		}

		.footer-right ul.icons.alt li a:hover {
			color: #171717;
			border-color: var(--accent);
			background-color: var(--accent);
		}

		.footer-right ul.icons.alt li a svg { width: 1.05rem; height: 1.05rem; fill: currentColor; }

		@media screen and (max-width: 736px) {
			.footer-row { flex-direction: column; align-items: flex-start; gap: 14px; }
		}

	</style>
</head>

	<script>
		/* Filtro de la cuadrícula de trabajos */
		(function () {
			var tabs = document.querySelectorAll('.filter-tab');
			var items = document.querySelectorAll('.work-grid__item');

			tabs.forEach(function (tab) {
				tab.addEventListener('click', function () {
					tabs.forEach(function (t) { t.classList.remove('active'); });
					tab.classList.add('active');

					var filter = tab.getAttribute('data-filter');

					items.forEach(function (item) {
						var show = filter === 'all' || item.getAttribute('data-category') === filter;
						item.classList.toggle('is-hidden', !show);
					});
				});
			});
		})();
	</script>
